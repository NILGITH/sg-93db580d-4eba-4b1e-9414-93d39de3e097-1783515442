<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Amiri basé sur le design fourni -->
  <!-- Fond rectangulaire élégant -->
  <rect x="2" y="10" width="196" height="40" rx="4" fill="#1A1A2E" stroke="#16213E" stroke-width="2"/>
  
  <!-- Texte AMIRI stylisé -->
  <text x="100" y="38" font-family="serif" font-size="28" font-weight="700" fill="#0F4C75" text-anchor="middle" letter-spacing="2">
    AMIRI
  </text>
  
  <!-- Accent décoratif -->
  <rect x="20" y="48" width="160" height="2" fill="#3282B8" rx="1"/>
  
  <!-- Slogan -->
  <text x="100" y="56" font-family="sans-serif" font-size="8" fill="#BBE1FA" text-anchor="middle" opacity="0.9">
    Votre partenaire immobilier de confiance
  </text>
</svg>